<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Builder</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-bg:        #141210;
      --c-panel:     #1c1916;
      --c-border:    #2e2b27;
      --c-text:      #e4e0da;
      --c-muted:     #7a756f;
      --c-faint:     #3a3630;
      --c-input-bg:  #242018;
      --c-accent:    #c0622e;
      --c-accent2:   #e07a4a;
      --c-paper:     #faf8f5;
      --c-warm:      #f2ede6;
      --c-ink:       #111111;
      --c-ink2:      #555555;
      --c-ink3:      #999999;
      --c-line:      #e0dbd4;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Outfit', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;
      --sidebar-w:   400px;
      --radius:      8px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-body);
      background: var(--c-bg);
      color: var(--c-text);
      display: flex;
    }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--c-panel);
      border-right: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    .sb-head {
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }
    .sb-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--c-text);
      letter-spacing: -0.3px;
    }
    .sb-logo em { color: var(--c-accent2); font-style: normal; }
    .sb-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-top: 3px;
    }

    .sb-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 26px 120px;
      scrollbar-width: thin;
      scrollbar-color: var(--c-faint) transparent;
    }
    .sb-body::-webkit-scrollbar { width: 4px; }
    .sb-body::-webkit-scrollbar-thumb { background: var(--c-faint); border-radius: 4px; }

    /* Section labels */
    .sb-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-top: 24px;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--c-border);
    }
    .sb-label:first-child { margin-top: 0; }

    /* Fields */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--c-muted);
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }
    .field input,
    .field textarea {
      width: 100%;
      background: var(--c-input-bg);
      border: 1px solid var(--c-faint);
      border-radius: var(--radius);
      padding: 8px 11px;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--c-text);
      transition: border-color 0.15s;
      resize: none;
      line-height: 1.5;
    }
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--c-accent2);
    }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--c-faint); }

    /* Photo upload */
    .photo-box {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--c-input-bg);
      border: 2px dashed var(--c-faint);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }
    .photo-box:hover { border-color: var(--c-accent2); }
    .photo-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--c-faint);
      background: var(--c-bg);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .photo-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-info .pi-title { font-size: 12px; color: var(--c-text); font-weight: 500; }
    .photo-info .pi-sub  { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
    .photo-remove {
      margin-left: auto;
      background: none;
      border: none;
      color: #c0392b;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background 0.15s;
      display: none;
    }
    .photo-remove:hover { background: rgba(192,57,43,.15); }
    #photoFile { display: none; }

    /* Entry cards */
    .card {
      background: #201d19;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 12px 13px;
      margin-bottom: 8px;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .card-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-accent2);
    }
    .btn-remove {
      background: none;
      border: 1px solid var(--c-border);
      color: var(--c-muted);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .btn-remove:hover { border-color: #c0392b; color: #c0392b; }

    .btn-add {
      width: 100%;
      background: var(--c-input-bg);
      border: 1px dashed var(--c-faint);
      color: var(--c-muted);
      padding: 9px;
      border-radius: var(--radius);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
      margin-top: 2px;
    }
    .btn-add:hover { border-color: var(--c-accent2); color: var(--c-accent2); }

    /* Footer */
    .sb-foot {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      padding: 14px 22px 16px;
      background: var(--c-panel);
      border-top: 1px solid var(--c-border);
    }
    .btn-dl {
      width: 100%;
      background: var(--c-accent);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-dl:hover  { background: #a85228; transform: translateY(-1px); }
    .btn-dl:active { transform: translateY(0); }
    .btn-dl:disabled { background: #6b3220; cursor: not-allowed; transform: none; }

    /* ============================================================
       PREVIEW AREA
    ============================================================ */
    #preview {
      flex: 1;
      background: var(--c-bg);
      overflow-y: auto;
      padding: 44px 40px 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ============================================================
       CV DOCUMENT
    ============================================================ */
    #cvDoc {
      width: 100%;
      max-width: 680px;
      background: var(--c-paper);
      color: var(--c-ink);
      font-family: var(--font-body);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      border-radius: 2px;
    }

    /* --- CV HEADER --- */
    .cv-hd {
      background: var(--c-ink);
      padding: 36px 44px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }
    .cv-hd::before {
      content: '';
      position: absolute;
      right: -50px; top: -50px;
      width: 220px; height: 220px;
      background: var(--c-accent);
      opacity: .08;
      border-radius: 50%;
      pointer-events: none;
    }
    .cv-hd::after {
      content: '';
      position: absolute;
      left: 30px; bottom: -70px;
      width: 160px; height: 160px;
      background: var(--c-accent2);
      opacity: .05;
      border-radius: 50%;
      pointer-events: none;
    }

    #cvPhoto {
      width: 86px; height: 86px;
      border-radius: 50%;
      border: 3px solid var(--c-accent2);
      overflow: hidden;
      flex-shrink: 0;
      background: #252218;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      position: relative; z-index: 1;
    }
    #cvPhoto img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    .cv-hd-text { flex: 1; position: relative; z-index: 1; }
    #cv-name {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    #cv-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--c-accent2);
      margin-top: 6px;
    }
    #cv-contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 18px;
      margin-top: 14px;
    }
    .cv-contact {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: rgba(255,255,255,.5);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cv-contact::before {
      content: '';
      width: 4px; height: 4px;
      background: var(--c-accent2);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- CV BODY --- */
    .cv-body { padding: 30px 44px 38px; }

    .cv-sec { margin-bottom: 26px; }
    .cv-sec:last-child { margin-bottom: 0; }

    .cv-sec-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--c-accent);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .cv-sec-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--c-line);
    }

    /* Summary */
    .cv-summary {
      font-size: 13px;
      line-height: 1.8;
      color: #3a3a3a;
    }

    /* Experience */
    .cv-exp-item {
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--c-line);
    }
    .cv-exp-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

    .cv-exp-row1 {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .cv-exp-title-text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--c-ink);
      line-height: 1.2;
    }
    .cv-exp-dates {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-ink2);
      white-space: nowrap;
      background: var(--c-warm);
      padding: 2px 8px;
      border-radius: 3px;
      margin-top: 3px;
      flex-shrink: 0;
    }
    .cv-exp-company {
      font-size: 12px;
      color: var(--c-accent);
      font-weight: 500;
      margin: 4px 0 7px;
    }
    .cv-exp-desc {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--c-ink2);
    }

    /* Education */
    .cv-edu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid var(--c-line);
    }
    .cv-edu-item:first-child { padding-top: 0; }
    .cv-edu-item:last-child  { border-bottom: none; padding-bottom: 0; }
    .cv-edu-degree {
      font-size: 13px;
      font-weight: 600;
      color: var(--c-ink);
      line-height: 1.3;
    }
    .cv-edu-school {
      font-size: 12px;
      color: var(--c-ink2);
      margin-top: 2px;
    }
    .cv-edu-year {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-ink3);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }

    /* Skills */
    .cv-skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cv-skill {
      font-size: 12px;
      color: var(--c-ink);
      background: var(--c-warm);
      border: 1px solid var(--c-line);
      padding: 4px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cv-skill::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--c-accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      color: #eee;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-family: var(--font-body);
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbar on preview */
    #preview::-webkit-scrollbar { width: 6px; }
    #preview::-webkit-scrollbar-thumb { background: var(--c-faint); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
<aside id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">CV<em>.</em>Builder</div>
    <div class="sb-tag">Professional Resume Creator</div>
  </div>

  <div class="sb-body">

    <!-- Photo -->
    <div class="sb-label">Profile Photo</div>
    <div class="photo-box" id="photoBox" onclick="document.getElementById('photoFile').click()">
      <div class="photo-avatar" id="photoAvatar">
        <span id="photoEmoji">👤</span>
        <img id="photoThumb" alt="photo" />
      </div>
      <div class="photo-info">
        <div class="pi-title">Upload Photo</div>
        <div class="pi-sub">JPG or PNG · appears in CV header</div>
      </div>
      <button class="photo-remove" id="photoRemove" onclick="removePhoto(event)" title="Remove photo">✕</button>
    </div>
    <input type="file" id="photoFile" accept="image/png,image/jpeg,image/jpg,image/webp" />

    <!-- Personal -->
    <div class="sb-label">Personal Information</div>
    <div class="field"><label>Full Name</label><input type="text" id="f-name" placeholder="e.g. John Smith" /></div>
    <div class="field"><label>Job Title</label><input type="text" id="f-title" placeholder="e.g. Software Engineer" /></div>
    <div class="row2">
      <div class="field"><label>Email</label><input type="email" id="f-email" placeholder="you@email.com" /></div>
      <div class="field"><label>Phone</label><input type="tel" id="f-phone" placeholder="+1 555 0100" /></div>
    </div>
    <div class="row2">
      <div class="field"><label>Location</label><input type="text" id="f-location" placeholder="City, Country" /></div>
      <div class="field"><label>LinkedIn / Website</label><input type="text" id="f-web" placeholder="linkedin.com/in/you" /></div>
    </div>

    <!-- Summary -->
    <div class="sb-label">Professional Summary</div>
    <div class="field">
      <textarea id="f-summary" rows="4" placeholder="Write a short professional summary about yourself..."></textarea>
    </div>

    <!-- Experience -->
    <div class="sb-label">Work Experience</div>
    <div id="exp-list"></div>
    <button class="btn-add" onclick="addExp()">＋ Add Experience</button>

    <!-- Education -->
    <div class="sb-label">Education</div>
    <div id="edu-list"></div>
    <button class="btn-add" onclick="addEdu()">＋ Add Education</button>

    <!-- Skills -->
    <div class="sb-label">Skills</div>
    <div id="skill-list"></div>
    <button class="btn-add" onclick="addSkill()">＋ Add Skill</button>

  </div><!-- /sb-body -->

  <div class="sb-foot">
    <button class="btn-dl" id="btnDl" onclick="downloadPDF()">⬇ &nbsp;Download PDF</button>
  </div>
</aside>

<!-- ═══════════════════════════ PREVIEW ═══════════════════════════ -->
<main id="preview">
  <div id="cvDoc">

    <!-- Header -->
    <div class="cv-hd">
      <div id="cvPhoto">
        <span id="cvPhotoEmoji">👤</span>
        <img id="cvPhotoImg" alt="profile photo" />
      </div>
      <div class="cv-hd-text">
        <div id="cv-name">Your Name</div>
        <div id="cv-title">Your Job Title</div>
        <div id="cv-contacts"></div>
      </div>
    </div>

    <!-- Body -->
    <div class="cv-body">

      <div class="cv-sec" id="sec-summary" style="display:none">
        <div class="cv-sec-title">Profile</div>
        <p class="cv-summary" id="cv-summary-text"></p>
      </div>

      <div class="cv-sec" id="sec-exp" style="display:none">
        <div class="cv-sec-title">Experience</div>
        <div id="cv-exp-items"></div>
      </div>

      <div class="cv-sec" id="sec-edu" style="display:none">
        <div class="cv-sec-title">Education</div>
        <div id="cv-edu-items"></div>
      </div>

      <div class="cv-sec" id="sec-skills" style="display:none">
        <div class="cv-sec-title">Skills</div>
        <div class="cv-skills-wrap" id="cv-skill-items"></div>
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<!-- ═══════════════════════════ SCRIPT ═══════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── state ── */
  let photoSrc = null;
  let expIdx = 0, eduIdx = 0, skillIdx = 0;

  /* ─────────────── PHOTO ─────────────── */
  document.getElementById('photoFile').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      photoSrc = e.target.result;
      // sidebar
      document.getElementById('photoEmoji').style.display = 'none';
      const t = document.getElementById('photoThumb');
      t.src = photoSrc;
      t.style.display = 'block';
      document.getElementById('photoRemove').style.display = 'block';
      // cv
      document.getElementById('cvPhotoEmoji').style.display = 'none';
      const ci = document.getElementById('cvPhotoImg');
      ci.src = photoSrc;
      ci.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  window.removePhoto = function (e) {
    e.stopPropagation();
    photoSrc = null;
    document.getElementById('photoEmoji').style.display = '';
    const t = document.getElementById('photoThumb'); t.src = ''; t.style.display = 'none';
    document.getElementById('photoRemove').style.display = 'none';
    document.getElementById('cvPhotoEmoji').style.display = '';
    const ci = document.getElementById('cvPhotoImg'); ci.src = ''; ci.style.display = 'none';
    document.getElementById('photoFile').value = '';
  };

  /* ─────────────── ADD ENTRIES ─────────────── */
  window.addExp = function () {
    expIdx++;
    const id = expIdx;
    document.getElementById('exp-list').insertAdjacentHTML('beforeend', `
      <div class="card" data-exp="${id}">
        <div class="card-head">
          <span class="card-tag">EXPERIENCE #${document.querySelectorAll('[data-exp]').length}</span>
          <button class="btn-remove" onclick="removeCard('exp','${id}')">Remove</button>
        </div>
        <div class="row2">
          <div class="field"><label>Job Title</label>
            <input type="text" class="ex-title" placeholder="Software Developer" /></div>
          <div class="field"><label>Company</label>
            <input type="text" class="ex-company" placeholder="Acme Corp" /></div>
        </div>
        <div class="field"><label>Duration</label>
          <input type="text" class="ex-duration" placeholder="Jan 2022 – Present" /></div>
        <div class="field"><label>Description</label>
          <textarea class="ex-desc" rows="3" placeholder="Describe your responsibilities and key achievements..."></textarea></div>
      </div>`);
    bindAll();
    render();
  };

  window.addEdu = function () {
    eduIdx++;
    const id = eduIdx;
    document.getElementById('edu-list').insertAdjacentHTML('beforeend', `
      <div class="card" data-edu="${id}">
        <div class="card-head">
          <span class="card-tag">EDUCATION #${document.querySelectorAll('[data-edu]').length}</span>
          <button class="btn-remove" onclick="removeCard('edu','${id}')">Remove</button>
        </div>
        <div class="row2">
          <div class="field"><label>Degree / Qualification</label>
            <input type="text" class="ed-degree" placeholder="B.Sc. Computer Science" /></div>
          <div class="field"><label>Year</label>
            <input type="text" class="ed-year" placeholder="2016 – 2020" /></div>
        </div>
        <div class="field"><label>Institution</label>
          <input type="text" class="ed-school" placeholder="University Name" /></div>
      </div>`);
    bindAll();
    render();
  };

  window.addSkill = function () {
    skillIdx++;
    const id = skillIdx;
    document.getElementById('skill-list').insertAdjacentHTML('beforeend', `
      <div class="card" data-skill="${id}" style="padding:8px 12px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="text" class="sk-name" placeholder="e.g. JavaScript, Figma, Python…" style="flex:1" />
          <button class="btn-remove" onclick="removeCard('skill','${id}')">✕</button>
        </div>
      </div>`);
    bindAll();
    render();
  };

  window.removeCard = function (type, id) {
    const el = document.querySelector(`[data-${type}="${id}"]`);
    if (el) el.remove();
    render();
  };

  /* ─────────────── BIND ─────────────── */
  function bindAll () {
    document.querySelectorAll('#sidebar input, #sidebar textarea').forEach(el => {
      el.removeEventListener('input', render);
      el.addEventListener('input', render);
    });
  }

  /* ─────────────── RENDER ─────────────── */
  function esc (str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function val (id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }

  function show (id, visible) {
    document.getElementById(id).style.display = visible ? '' : 'none';
  }

  function render () {
    const name     = val('f-name')     || 'Your Name';
    const title    = val('f-title')    || 'Your Job Title';
    const email    = val('f-email');
    const phone    = val('f-phone');
    const location = val('f-location');
    const web      = val('f-web');
    const summary  = val('f-summary');

    document.getElementById('cv-name').textContent  = name;
    document.getElementById('cv-title').textContent = title;

    /* contacts */
    const contacts = [email, phone, location, web].filter(Boolean);
    document.getElementById('cv-contacts').innerHTML = contacts
      .map(c => `<span class="cv-contact">${esc(c)}</span>`).join('');

    /* summary */
    if (summary) {
      show('sec-summary', true);
      document.getElementById('cv-summary-text').textContent = summary;
    } else {
      show('sec-summary', false);
    }

    /* experience */
    let expHTML = '';
    document.querySelectorAll('[data-exp]').forEach(card => {
      const t    = card.querySelector('.ex-title').value.trim();
      const co   = card.querySelector('.ex-company').value.trim();
      const dur  = card.querySelector('.ex-duration').value.trim();
      const desc = card.querySelector('.ex-desc').value.trim();
      if (!t && !co) return;
      expHTML += `
        <div class="cv-exp-item">
          <div class="cv-exp-row1">
            <div class="cv-exp-title-text">${esc(t || '—')}</div>
            ${dur ? `<div class="cv-exp-dates">${esc(dur)}</div>` : ''}
          </div>
          ${co   ? `<div class="cv-exp-company">${esc(co)}</div>` : ''}
          ${desc ? `<div class="cv-exp-desc">${esc(desc).replace(/\n/g, '<br>')}</div>` : ''}
        </div>`;
    });
    show('sec-exp', !!expHTML);
    document.getElementById('cv-exp-items').innerHTML = expHTML;

    /* education */
    let eduHTML = '';
    document.querySelectorAll('[data-edu]').forEach(card => {
      const deg    = card.querySelector('.ed-degree').value.trim();
      const school = card.querySelector('.ed-school').value.trim();
      const year   = card.querySelector('.ed-year').value.trim();
      if (!deg && !school) return;
      eduHTML += `
        <div class="cv-edu-item">
          <div>
            <div class="cv-edu-degree">${esc(deg || '—')}</div>
            ${school ? `<div class="cv-edu-school">${esc(school)}</div>` : ''}
          </div>
          ${year ? `<div class="cv-edu-year">${esc(year)}</div>` : ''}
        </div>`;
    });
    show('sec-edu', !!eduHTML);
    document.getElementById('cv-edu-items').innerHTML = eduHTML;

    /* skills */
    let skillHTML = '';
    document.querySelectorAll('[data-skill] .sk-name').forEach(inp => {
      const s = inp.value.trim();
      if (s) skillHTML += `<div class="cv-skill">${esc(s)}</div>`;
    });
    show('sec-skills', !!skillHTML);
    document.getElementById('cv-skill-items').innerHTML = skillHTML;
  }

  /* ─────────────── PDF DOWNLOAD ─────────────── */
  window.downloadPDF = async function () {
    const btn = document.getElementById('btnDl');
    btn.disabled = true;
    btn.textContent = '⏳  Generating PDF…';
    toast('Preparing your CV…');

    try {
      const doc = document.getElementById('cvDoc');

      const canvas = await html2canvas(doc, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#faf8f5',
        logging: false,
        width:  doc.scrollWidth,
        height: doc.scrollHeight,
        windowWidth:  doc.scrollWidth,
        windowHeight: doc.scrollHeight
      });

      const { jsPDF } = window.jspdf;

      /* A4 dimensions in pt: 595.28 × 841.89 */
      const PAGE_W = 595.28;
      const PAGE_H = 841.89;

      const imgW  = PAGE_W;
      const imgH  = (canvas.height / canvas.width) * PAGE_W;

      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'pt',
        format: 'a4',
        compress: true
      });

      if (imgH <= PAGE_H) {
        /* Fits on one page */
        pdf.addImage(
          canvas.toDataURL('image/jpeg', 0.95),
          'JPEG', 0, 0, imgW, imgH
        );
      } else {
        /* Multi-page: slice canvas into A4-height chunks */
        const ratio    = canvas.width / PAGE_W;   /* px per pt */
        const slicePx  = Math.floor(PAGE_H * ratio);
        let   yPx      = 0;

        while (yPx < canvas.height) {
          const remaining = canvas.height - yPx;
          const chunkPx   = Math.min(slicePx, remaining);

          const slice  = document.createElement('canvas');
          slice.width  = canvas.width;
          slice.height = chunkPx;
          slice.getContext('2d').drawImage(
            canvas,
            0, yPx, canvas.width, chunkPx,
            0,    0, canvas.width, chunkPx
          );

          const chunkH = (chunkPx / canvas.width) * PAGE_W;
          if (yPx > 0) pdf.addPage();
          pdf.addImage(
            slice.toDataURL('image/jpeg', 0.95),
            'JPEG', 0, 0, PAGE_W, chunkH
          );

          yPx += chunkPx;
        }
      }

      const filename = (val('f-name') || 'CV').replace(/\s+/g, '_') + '_CV.pdf';
      pdf.save(filename);
      toast('PDF downloaded!');
    } catch (err) {
      console.error('PDF error:', err);
      toast('Something went wrong. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '⬇ &nbsp;Download PDF';
    }
  };

  /* ─────────────── TOAST ─────────────── */
  function toast (msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ─────────────── INIT ─────────────── */
  bindAll();
  render();

})();
</script>
</body>
</html>
